<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboSiege | Top-Down Extreme</title>
    <!-- Phaser via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            image-rendering: pixelated;
        }
    </style>
</head>

<body>
    <script>
        // --- ROBOSIEGE: TOP-DOWN EXTREME EDITION ---

        class Boot extends Phaser.Scene {
            constructor() { super('Boot'); }
            create() { this.scene.start('Preloader'); }
        }

        class Preloader extends Phaser.Scene {
            constructor() { super('Preloader'); }
            preload() {
                const width = 1280; const height = 720;
                this.add.text(width / 2, height / 2 - 50, 'VALIDANDO PROTOCOLOS DE SEGURANÇA...', { fontSize: '30px', color: '#00ffff' }).setOrigin(0.5);
            }
            create() { this.scene.start('MainMenu'); }
        }

        class MainMenu extends Phaser.Scene {
            constructor() { super('MainMenu'); }
            create() {
                const width = 1280; const height = 720;
                this.add.text(width / 2, height / 3, 'ROBO SIEGE', { fontSize: '120px', color: '#00ffff', stroke: '#ff00ff', strokeThickness: 15 }).setOrigin(0.5);
                this.add.text(width / 2, height / 2.2, 'REGRA: CAMINHO SEMPRE ABERTO', { fontSize: '30px', color: '#ffff00' }).setOrigin(0.5);

                const playBtn = this.add.rectangle(width / 2, height / 1.5, 400, 80, 0x00ffff).setInteractive().on('pointerdown', () => this.scene.start('BuildScene'));
                this.add.text(width / 2, height / 1.5, 'JOGAR', { fontSize: '40px', color: '#000' }).setOrigin(0.5);
            }
        }

        class BuildScene extends Phaser.Scene {
            constructor() {
                super('BuildScene');
                this.selectedItem = 'steel';
                this.items = {
                    steel: { cost: 15, color: 0x444444, label: 'Muro' },
                    mine: { cost: 60, color: 0x8800ff, label: 'Mina' },
                    spikes: { cost: 40, color: 0xff0000, label: 'Espinhos' },
                    turret: { cost: 120, color: 0xffa500, label: 'Laser' },
                    speed: { cost: 30, color: 0x00ff00, label: 'Turbo' }
                };
            }

            create() {
                this.scrap = 1000; // Reduzido de 2000 para 1000 e resetado a cada partida
                this.grid = Array(32).fill().map(() => Array(18).fill(null));
                this.corePos = { x: 30, y: 8 };
                this.spawnPos = { x: 1, y: 16 };
                this.isTransitioning = false;
                this.defenseTimer = 60; // Timer para a fase do defensor

                const graphics = this.add.graphics();
                graphics.lineStyle(1, 0x00ffff, 0.1);
                for (let i = 0; i <= 32; i++) graphics.lineBetween(i * 40, 0, i * 40, 720);
                for (let j = 0; j <= 18; j++) graphics.lineBetween(0, j * 40, 1280, j * 40);

                this.createUI();
                this.add.star(this.corePos.x * 40 + 20, this.corePos.y * 40 + 20, 5, 15, 30, 0x00ffff).setStrokeStyle(2, 0xff00ff);
                this.grid[this.corePos.x][this.corePos.y] = 'core';

                this.input.on('pointerdown', (p) => this.placeItem(p));

                this.statusText = this.add.text(640, 30, 'DEFESA: Crie labirintos (Caminho obrigatório)', { fontSize: '24px', color: '#00ffff' }).setOrigin(0.5);
                this.warningText = this.add.text(640, 70, '', { fontSize: '20px', color: '#ff0000' }).setOrigin(0.5);

                this.timerText = this.add.text(20, 20, `TEMPO: ${this.defenseTimer}`, { fontSize: '28px', color: '#ff00ff' });
                this.time.addEvent({
                    delay: 1000, callback: () => {
                        if (this.isTransitioning) return;
                        this.defenseTimer--;
                        this.timerText.setText(`TEMPO: ${this.defenseTimer}`);
                        if (this.defenseTimer <= 0) {
                            this.showWarning("TEMPO ESGOTADO! INVASÃO COMEÇANDO...");
                            this.isTransitioning = true;
                            this.time.delayedCall(2000, () => this.scene.start('ActionScene', { grid: this.grid }));
                        }
                    }, loop: true
                });
            }

            createUI() {
                const width = 1280; const height = 720;
                this.add.rectangle(width / 2, height - 60, 700, 100, 0x111111, 0.9).setStrokeStyle(3, 0x00ffff);
                let xOffset = width / 2 - 280;
                Object.keys(this.items).forEach(key => {
                    const item = this.items[key];
                    const btn = this.add.rectangle(xOffset, height - 60, 100, 60, item.color).setInteractive().on('pointerdown', () => this.selectedItem = key);
                    this.add.text(xOffset, height - 70, item.label, { fontSize: '12px', color: '#fff', fontWeight: 'bold' }).setOrigin(0.5);
                    this.add.text(xOffset, height - 50, `$${item.cost}`, { fontSize: '14px', color: '#ffff00', fontWeight: 'bold' }).setOrigin(0.5);
                    xOffset += 115;
                });
                this.scrapText = this.add.text(width - 250, height - 60, `SUCATA: ${this.scrap}`, { fontSize: '28px', color: '#ffff00' });
            }

            placeItem(p) {
                if (this.isTransitioning) return;
                // Ajuste para ignorar cliques na área da UI
                if (p.y > 600) return;

                const x = Math.floor(p.x / 40);
                const y = Math.floor(p.y / 40);

                if (x >= 0 && x < 32 && y >= 0 && y < 18) {
                    if (this.grid[x][y]) return;

                    const item = this.items[this.selectedItem];
                    if (this.scrap < item.cost) {
                        this.showWarning("SUCATA INSUFICIENTE!");
                        return;
                    }

                    // Apenas muros ('steel') bloqueiam o caminho fisicamente
                    if (this.selectedItem === 'steel') {
                        this.grid[x][y] = 'steel';
                        if (!this.checkPath()) {
                            this.grid[x][y] = null;
                            this.showWarning("ESSE BLOCO FECHA O CAMINHO!");
                            return;
                        }
                    } else {
                        this.grid[x][y] = this.selectedItem;
                    }

                    this.scrap -= item.cost;
                    this.scrapText.setText(`SUCATA: ${this.scrap}`);
                    this.add.rectangle(x * 40 + 20, y * 40 + 20, 38, 38, item.color);

                    if (this.scrap <= 0) {
                        this.showWarning("SUCATA ESGOTADA! INVASÃO EM 3s...");
                        this.isTransitioning = true;
                        this.time.delayedCall(3000, () => this.scene.start('ActionScene', { grid: this.grid }));
                    }
                }
            }

            showWarning(msg) {
                this.warningText.setText(msg);
                this.time.delayedCall(2000, () => this.warningText.setText(''));
            }

            checkPath() {
                const start = this.spawnPos;
                const queue = [start];
                const visited = new Set([`${start.x},${start.y}`]);

                while (queue.length > 0) {
                    const curr = queue.shift();
                    if (curr.x === this.corePos.x && curr.y === this.corePos.y) return true;

                    const dirs = [{ x: 1, y: 0 }, { x: -1, y: 0 }, { x: 0, y: 1 }, { x: 0, y: -1 }];
                    for (let d of dirs) {
                        const nx = curr.x + d.x; const ny = curr.y + d.y;
                        if (nx >= 0 && nx < 32 && ny >= 0 && ny < 18) {
                            const key = `${nx},${ny}`;
                            // Consideramos 'steel' como o único obstáculo físico real, 
                            // mas para garantir um caminho limpo, podemos checar se o bloco é intransponível.
                            // Neste jogo, apenas 'steel' (Muro) tem colisão física.
                            if (!visited.has(key) && this.grid[nx][ny] !== 'steel') {
                                visited.add(key);
                                queue.push({ x: nx, y: ny });
                            }
                        }
                    }
                }
                return false;
            }
        }

        class ActionScene extends Phaser.Scene {
            constructor() { super('ActionScene'); }
            init(data) { this.gridData = data.grid; this.hp = 2; this.timer = 60; }

            create() {
                const width = 1280; const height = 720;
                this.platforms = this.physics.add.staticGroup();
                this.hazards = this.physics.add.staticGroup();
                this.projectiles = this.physics.add.group();
                this.coreGroup = this.physics.add.staticGroup();

                for (let i = 0; i < 32; i++) {
                    for (let j = 0; j < 18; j++) {
                        const item = this.gridData[i][j];
                        const x = i * 40 + 20; const y = j * 40 + 20;
                        if (item === 'steel') this.platforms.create(x, y, null).setDisplaySize(40, 40).setTint(0x555555).refreshBody();
                        else if (item === 'spikes') {
                            this.hazards.create(x, y, null).setDisplaySize(30, 30).refreshBody();
                            this.add.circle(x, y, 10, 0xff0000);
                        }
                        else if (item === 'core') {
                            this.coreObj = this.coreGroup.create(x, y, null).setDisplaySize(60, 60).refreshBody();
                            this.add.star(x, y, 5, 15, 30, 0x00ffff).setStrokeStyle(3, 0xff00ff);
                        }
                        else if (item === 'turret') {
                            this.add.rectangle(x, y, 30, 30, 0xffa500);
                            this.time.addEvent({ delay: 1800, callback: () => this.fireTurret(x, y), loop: true });
                        }
                        else if (item === 'speed') {
                            this.add.rectangle(x, y, 40, 40, 0x00ff00, 0.3);
                        }
                        else if (item === 'mine') {
                            this.hazards.create(x, y, null).setDisplaySize(20, 20).refreshBody();
                            this.add.circle(x, y, 10, 0x8800ff);
                        }
                    }
                }

                this.player = this.physics.add.sprite(60, 660, null).setCircle(15);
                this.player.setCollideWorldBounds(true).setTint(0x00ffff);
                this.pVisual = this.add.circle(0, 0, 15, 0x00ffff);

                this.cursors = this.input.keyboard.createCursorKeys();
                this.keys = this.input.keyboard.addKeys('W,A,S,D');

                this.physics.add.collider(this.player, this.platforms);
                this.physics.add.overlap(this.player, this.hazards, (p, h) => { h.destroy(); this.takeDamage(); });
                this.physics.add.overlap(this.player, this.coreGroup, () => this.victory());
                this.physics.add.overlap(this.player, this.projectiles, (p, pr) => { pr.destroy(); this.takeDamage(); });

                this.hpText = this.add.text(20, 20, `HP: ${'❤️'.repeat(this.hp)}`, { fontSize: '32px', color: '#ff00ff' });
                this.timerText = this.add.text(1100, 20, `TEMPO: ${this.timer}`, { fontSize: '28px', color: '#ffff00' });

                this.time.addEvent({
                    delay: 1000, callback: () => {
                        this.timer--;
                        this.timerText.setText(`TEMPO: ${this.timer}`);
                        if (this.timer <= 0) this.gameOver("TEMPO ESGOTADO!");
                    }, loop: true
                });

                // Mensagem de início de fase
                const welcomeText = this.add.text(640, 360, "ATACANTE, TENTE ALCANÇAR O DEFENSOR\nNA SEGUNDA FASE DO JOGO", {
                    fontSize: '42px', color: '#00ffff', align: 'center', stroke: '#ff00ff', strokeThickness: 6
                }).setOrigin(0.5);
                this.time.delayedCall(3000, () => welcomeText.destroy());
            }

            fireTurret(x, y) {
                const p = this.projectiles.create(x, y, null).setDisplaySize(12, 12).setTint(0xffa500);
                p.body.setAllowGravity(false);
                this.physics.moveToObject(p, this.player, 280);
            }

            takeDamage() {
                this.hp--;
                this.hpText.setText(`HP: ${'❤️'.repeat(Math.max(0, this.hp))}`);
                this.cameras.main.shake(200, 0.02);
                if (this.hp <= 0) this.gameOver("VOCÊ PERDEU TODAS AS VIDAS!");
            }

            victory() {
                alert("SISTEMA DOMINADO! VITÓRIA DO INVASOR!");
                this.scene.start('MainMenu');
            }

            gameOver(msg) {
                alert(msg);
                this.scene.start('MainMenu');
            }

            update() {
                this.pVisual.setPosition(this.player.x, this.player.y);
                const moveSpeed = 300;
                this.player.setVelocity(0);
                if (this.cursors.left.isDown || this.keys.A.isDown) this.player.setVelocityX(-moveSpeed);
                else if (this.cursors.right.isDown || this.keys.D.isDown) this.player.setVelocityX(moveSpeed);
                if (this.cursors.up.isDown || this.keys.W.isDown) this.player.setVelocityY(-moveSpeed);
                else if (this.cursors.down.isDown || this.keys.S.isDown) this.player.setVelocityY(moveSpeed);
            }
        }

        const config = {
            type: Phaser.CANVAS,
            width: 1280, height: 720,
            backgroundColor: '#050505',
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
            physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
            scene: [Boot, Preloader, MainMenu, BuildScene, ActionScene]
        };

        new Phaser.Game(config);
    </script>
</body>

</html>
