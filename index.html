<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboSiege | Estratégia e Parkour</title>
    <!-- Phaser via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --bg-dark: #050507;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: crosshair;
        }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
            border: 2px solid rgba(0, 255, 255, 0.2);
            background: #000;
        }

        /* Efeito de Scanline opcional - Ajustado para não bloquear a visão */
        body::after {
            content: " ";
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 999;
            background-size: 100% 4px;
            pointer-events: none;
            opacity: 0.3;
        }
    </style>
</head>

<body>
    <div id="game-container"></div>

    <script>
        // --- CÓDIGO DO JOGO CONSOLIDADO ---

        class Boot extends Phaser.Scene {
            constructor() { super('Boot'); }
            create() { this.scene.start('Preloader'); }
        }

        class Preloader extends Phaser.Scene {
            constructor() { super('Preloader'); }
            preload() {
                const { width, height } = this.scale;
                let bar = this.add.graphics();
                this.load.on('progress', (v) => {
                    bar.clear();
                    bar.fillStyle(0x00ffff, 1);
                    bar.fillRect(width / 4, height / 2 - 25, (width / 2) * v, 50);
                });
                this.add.text(width / 2, height / 2 - 50, 'CARREGANDO SISTEMAS...', {
                    fontSize: '24px', fontFamily: 'Orbitron', color: '#00ffff'
                }).setOrigin(0.5);
            }
            create() { this.scene.start('MainMenu'); }
        }

        class MainMenu extends Phaser.Scene {
            constructor() { super('MainMenu'); }
            create() {
                const { width, height } = this.scale;
                this.add.text(width / 2, height / 3, 'ROBO SIEGE', {
                    fontSize: '112px', fontFamily: 'Orbitron', color: '#00ffff', stroke: '#ff00ff', strokeThickness: 12
                }).setOrigin(0.5).setShadow(0, 0, '#00ffff', 20, true, true);

                const playBtn = this.add.text(width / 2, height / 1.6, 'INICIAR PROJETO', {
                    fontSize: '42px', fontFamily: 'Orbitron', color: '#ffffff', backgroundColor: '#ff00ff', padding: { x: 40, y: 20 }
                }).setOrigin(0.5).setInteractive();

                playBtn.on('pointerdown', () => this.scene.start('BuildScene'));
                playBtn.on('pointerover', () => playBtn.setScale(1.1));
                playBtn.on('pointerout', () => playBtn.setScale(1.0));

                this.add.text(width / 2, height - 50, 'Use o Mouse para Construir | WASD + Shift para Invasão', {
                    fontSize: '16px', color: '#555'
                }).setOrigin(0.5);
            }
        }

        class BuildScene extends Phaser.Scene {
            constructor() {
                super('BuildScene');
                this.tileSize = 40;
                this.grid = [];
                this.cols = 32; this.rows = 18;
                this.scrap = 500;
                this.selectedItem = 'steel';
                this.items = {
                    steel: { cost: 10, color: 0x444444, label: 'Bloco Aço' },
                    fake: { cost: 20, color: 0x8888ff, label: 'Bloco Falso' },
                    spikes: { cost: 30, color: 0xff0000, label: 'Espinhos' },
                    turret: { cost: 80, color: 0xffff00, label: 'Laser' },
                    jump: { cost: 40, color: 0x00ff00, label: 'Impulso' }
                };
            }

            create() {
                this.grid = Array(this.cols).fill().map(() => Array(this.rows).fill(null));

                const graphics = this.add.graphics();
                graphics.lineStyle(1, 0x00ffff, 0.1);
                for (let i = 0; i <= this.cols; i++) graphics.lineBetween(i * 40, 0, i * 40, 720);
                for (let j = 0; j <= this.rows; j++) graphics.lineBetween(0, j * 40, 1280, j * 40);

                this.createUI();
                this.createCore();

                this.input.on('pointerdown', (p) => this.placeItem(p));

                this.timeLeft = 60;
                this.timerText = this.add.text(20, 20, `TEMPO: ${this.timeLeft}s`, {
                    fontSize: '28px', color: '#ff00ff', fontFamily: 'Orbitron'
                });

                this.time.addEvent({
                    delay: 1000,
                    callback: () => {
                        this.timeLeft--;
                        this.timerText.setText(`TEMPO: ${this.timeLeft}s`);
                        if (this.timeLeft <= 0) this.finishBuild();
                    },
                    loop: true
                });
            }

            createUI() {
                const { width, height } = this.scale;
                this.add.rectangle(width / 2, height - 60, 700, 100, 0x111111, 0.9).setStrokeStyle(3, 0x00ffff);
                let xOffset = width / 2 - 280;
                Object.keys(this.items).forEach(key => {
                    const item = this.items[key];
                    const btn = this.add.rectangle(xOffset, height - 60, 100, 60, item.color, 0.8)
                        .setInteractive().on('pointerdown', () => { this.selectedItem = key; });
                    this.add.text(xOffset, height - 60, item.label, { fontSize: '12px', fontFamily: 'Orbitron' }).setOrigin(0.5);
                    xOffset += 115;
                });
                this.scrapText = this.add.text(width - 250, 20, `SUCATA: ${this.scrap}`, {
                    fontSize: '28px', color: '#ffff00', fontFamily: 'Orbitron'
                });
            }

            createCore() {
                const x = this.cols - 3; const y = this.rows - 5;
                this.add.star(x * 40 + 20, y * 40 + 20, 5, 15, 30, 0x00ffff).setStrokeStyle(2, 0xff00ff);
                this.grid[x][y] = 'core';
            }

            placeItem(p) {
                if (p.y > 610) return;
                const x = Math.floor(p.x / 40);
                const y = Math.floor(p.y / 40);
                if (x >= 0 && x < this.cols && y >= 0 && y < this.rows) {
                    const item = this.items[this.selectedItem];
                    if (this.scrap >= item.cost && !this.grid[x][y]) {
                        this.scrap -= item.cost;
                        this.grid[x][y] = this.selectedItem;
                        this.scrapText.setText(`SUCATA: ${this.scrap}`);
                        this.add.rectangle(x * 40 + 20, y * 40 + 20, 38, 38, item.color);
                    }
                }
            }

            finishBuild() { this.scene.start('ActionScene', { grid: this.grid }); }
        }

        class ActionScene extends Phaser.Scene {
            constructor() { super('ActionScene'); }
            init(data) { this.gridData = data.grid; }
            create() {
                const { width, height } = this.scale;
                this.platforms = this.physics.add.staticGroup();
                this.hazards = this.physics.add.staticGroup();
                this.projectiles = this.physics.add.group();
                this.jumpPads = this.physics.add.staticGroup();
                this.coreGroup = this.physics.add.staticGroup();

                for (let i = 0; i < 32; i++) {
                    for (let j = 0; j < 18; j++) {
                        const item = this.gridData[i][j];
                        const x = i * 40 + 20; const y = j * 40 + 20;
                        if (item === 'steel') this.platforms.create(x, y, null).setDisplaySize(40, 40).setTint(0x555555).refreshBody();
                        else if (item === 'spikes') {
                            this.hazards.create(x, y + 10, null).setDisplaySize(30, 20).refreshBody();
                            this.add.triangle(x, y + 10, 0, 10, 15, -10, 30, 10, 0xff0000);
                        }
                        else if (item === 'core') {
                            this.coreObj = this.coreGroup.create(x, y, null).setDisplaySize(60, 60).refreshBody();
                            this.add.star(x, y, 5, 15, 30, 0x00ffff).setStrokeStyle(3, 0xff00ff);
                        }
                        else if (item === 'fake') this.add.rectangle(x, y, 40, 40, 0x444444);
                        else if (item === 'jump') {
                            this.jumpPads.create(x, y + 15, null).setDisplaySize(40, 10).refreshBody();
                            this.add.rectangle(x, y + 15, 40, 10, 0x00ff00);
                        }
                        else if (item === 'turret') {
                            this.add.rectangle(x, y, 30, 30, 0xffff00);
                            this.time.addEvent({ delay: 2000, callback: () => this.fireTurret(x, y), loop: true });
                        }
                    }
                }

                this.player = this.physics.add.sprite(80, height - 100, null).setSize(30, 40);
                this.player.setCollideWorldBounds(true).setTint(0x00ffff);
                this.pVisual = this.add.rectangle(0, 0, 30, 40, 0x00ffff);

                this.cursors = this.input.keyboard.createCursorKeys();
                this.dashKey = this.input.keyboard.addKey('SHIFT');
                this.attackKey = this.input.keyboard.addKey('SPACE');

                this.physics.add.collider(this.player, this.platforms);
                this.physics.add.overlap(this.player, this.hazards, () => this.scene.restart());
                this.physics.add.overlap(this.player, this.jumpPads, () => this.player.setVelocityY(-900));
                this.physics.add.overlap(this.player, this.coreGroup, () => {
                    if (Phaser.Input.Keyboard.JustDown(this.attackKey)) {
                        alert("MISSÃO CUMPRIDA! NÚCLEO DESTRUÍDO.");
                        this.scene.start('MainMenu');
                    }
                });
                this.physics.add.overlap(this.player, this.projectiles, () => this.scene.restart());
                this.physics.add.collider(this.projectiles, this.platforms, (p) => p.destroy());

                this.canDoubleJump = true;
                this.add.text(20, 20, 'MISSÃO: DESTRUA O NÚCLEO (ESPAÇO)', { color: '#ff00ff', fontSize: '24px', fontFamily: 'Orbitron' });
            }

            fireTurret(x, y) {
                const p = this.projectiles.create(x, y, null).setDisplaySize(10, 10).setTint(0xffff00);
                p.body.setAllowGravity(false); p.setVelocityX(-400);
            }

            update() {
                this.pVisual.setPosition(this.player.x, this.player.y);
                const onGround = this.player.body.blocked.down;
                const onWall = this.player.body.blocked.left || this.player.body.blocked.right;

                if (this.cursors.left.isDown) this.player.setVelocityX(-350);
                else if (this.cursors.right.isDown) this.player.setVelocityX(350);
                else this.player.setVelocityX(0);

                if (Phaser.Input.Keyboard.JustDown(this.cursors.up)) {
                    if (onGround) { this.player.setVelocityY(-600); this.canDoubleJump = true; }
                    else if (onWall) { this.player.setVelocityY(-600); this.player.setVelocityX(this.player.body.blocked.left ? 400 : -400); }
                    else if (this.canDoubleJump) { this.player.setVelocityY(-550); this.canDoubleJump = false; }
                }

                if (Phaser.Input.Keyboard.JustDown(this.dashKey)) {
                    this.player.setVelocity((this.cursors.left.isDown ? -900 : 900), 0);
                }
            }
        }

        const config = {
            type: Phaser.AUTO,
            width: 1280, height: 720,
            parent: 'game-container',
            backgroundColor: '#0a0a0c',
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
            physics: { default: 'arcade', arcade: { gravity: { y: 1200 }, debug: false } },
            scene: [Boot, Preloader, MainMenu, BuildScene, ActionScene]
        };

        new Phaser.Game(config);
    </script>
</body>

</html>
