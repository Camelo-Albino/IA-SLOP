<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboSiege | Top-Down Strategy</title>
    <!-- Phaser via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            image-rendering: pixelated;
        }
    </style>
</head>

<body>
    <script>
        // --- ROBOSIEGE: TOP-DOWN EDITION ---

        class Boot extends Phaser.Scene {
            constructor() { super('Boot'); }
            create() { this.scene.start('Preloader'); }
        }

        class Preloader extends Phaser.Scene {
            constructor() { super('Preloader'); }
            preload() {
                const width = 1280; const height = 720;
                this.add.text(width / 2, height / 2 - 50, 'INICIALIZANDO PROTOCOLO TOP-DOWN...', { fontSize: '30px', color: '#00ffff' }).setOrigin(0.5);
            }
            create() { this.scene.start('MainMenu'); }
        }

        class MainMenu extends Phaser.Scene {
            constructor() { super('MainMenu'); }
            create() {
                const width = 1280; const height = 720;
                this.add.text(width / 2, height / 3, 'ROBO SIEGE', { fontSize: '120px', color: '#00ffff', stroke: '#ff00ff', strokeThickness: 15 }).setOrigin(0.5);
                this.add.text(width / 2, height / 2.2, 'TOP-DOWN STRATEGY', { fontSize: '30px', color: '#ff00ff' }).setOrigin(0.5);

                const playBtn = this.add.rectangle(width / 2, height / 1.5, 400, 80, 0x00ffff).setInteractive().on('pointerdown', () => this.scene.start('BuildScene'));
                this.add.text(width / 2, height / 1.5, 'INICIAR PROJETO', { fontSize: '40px', color: '#000' }).setOrigin(0.5);
            }
        }

        class BuildScene extends Phaser.Scene {
            constructor() {
                super('BuildScene');
                this.scrap = 2000; // Defensor com mais recursos
                this.selectedItem = 'steel';
                this.items = {
                    steel: { cost: 10, color: 0x444444, label: 'Muro Aço' },
                    fake: { cost: 20, color: 0x8888ff, label: 'Falso' },
                    spikes: { cost: 50, color: 0xff0000, label: 'Espinhos' },
                    turret: { cost: 150, color: 0xffff00, label: 'Laser' },
                    speed: { cost: 40, color: 0x00ff00, label: 'Turbo' }
                };
            }

            create() {
                this.grid = Array(32).fill().map(() => Array(18).fill(null));
                this.visualBlocks = this.add.group();

                const graphics = this.add.graphics();
                graphics.lineStyle(1, 0x00ffff, 0.1);
                for (let i = 0; i <= 32; i++) graphics.lineBetween(i * 40, 0, i * 40, 720);
                for (let j = 0; j <= 18; j++) graphics.lineBetween(0, j * 40, 1280, j * 40);

                this.createUI();
                this.createCore();

                this.input.on('pointerdown', (p) => this.placeItem(p));
                this.input.on('pointermove', (p) => { if (p.isDown) this.placeItem(p); });

                this.add.text(20, 20, 'MODO CONSTRUÇÃO', { fontSize: '24px', color: '#00ffff' });

                this.finishBtn = this.add.rectangle(1150, 50, 200, 60, 0xff00ff).setInteractive().on('pointerdown', () => this.tryFinish());
                this.finishTxt = this.add.text(1150, 50, 'FINALIZAR', { fontSize: '24px', color: '#fff' }).setOrigin(0.5);

                this.statusText = this.add.text(1280 / 2, 20, 'Status: Criando Defesas', { color: '#ffff00' }).setOrigin(0.5);
            }

            createUI() {
                const width = 1280; const height = 720;
                this.add.rectangle(width / 2, height - 60, 700, 100, 0x111111, 0.9).setStrokeStyle(3, 0x00ffff);
                let xOffset = width / 2 - 280;
                Object.keys(this.items).forEach(key => {
                    const item = this.items[key];
                    this.add.rectangle(xOffset, height - 60, 100, 60, item.color).setInteractive().on('pointerdown', () => this.selectedItem = key);
                    this.add.text(xOffset, height - 60, item.label, { fontSize: '11px', color: '#fff' }).setOrigin(0.5);
                    xOffset += 115;
                });
                this.scrapText = this.add.text(width - 250, height - 60, `SUCATA: ${this.scrap}`, { fontSize: '28px', color: '#ffff00' });
            }

            createCore() {
                this.corePos = { x: 29, y: 13 };
                this.add.star(this.corePos.x * 40 + 20, this.corePos.y * 40 + 20, 5, 15, 30, 0x00ffff).setStrokeStyle(2, 0xff00ff);
                this.grid[this.corePos.x][this.corePos.y] = 'core';
            }

            placeItem(p) {
                if (p.y > 610 || p.y < 120 && p.x > 1000) return;
                const x = Math.floor(p.x / 40); const y = Math.floor(p.y / 40);
                if (x >= 0 && x < 32 && y >= 0 && y < 18) {
                    const item = this.items[this.selectedItem];
                    if (this.scrap >= item.cost && !this.grid[x][y]) {
                        this.scrap -= item.cost;
                        this.grid[x][y] = this.selectedItem;
                        this.scrapText.setText(`SUCATA: ${this.scrap}`);
                        this.visualBlocks.add(this.add.rectangle(x * 40 + 20, y * 40 + 20, 38, 38, item.color));
                    }
                }
            }

            tryFinish() {
                if (this.checkPath()) this.scene.start('ActionScene', { grid: this.grid });
                else {
                    this.statusText.setText('ERRO: CAMINHO BLOQUEADO! Deixe uma rota aberta.').setColor('#ff0000');
                    this.time.delayedCall(2000, () => this.statusText.setText('Status: Criando Defesas').setColor('#ffff00'));
                }
            }

            checkPath() {
                // Algoritmo de busca simples (Flood Fill) para garantir rota
                const start = { x: 0, y: 17 }; // Invasor começa embaixo na esquerda
                const queue = [start];
                const visited = new Set();
                visited.add(`0,17`);

                while (queue.length > 0) {
                    const curr = queue.shift();
                    if (curr.x === this.corePos.x && curr.y === this.corePos.y) return true;

                    const neighbors = [
                        { x: curr.x + 1, y: curr.y }, { x: curr.x - 1, y: curr.y },
                        { x: curr.x, y: curr.y + 1 }, { x: curr.x, y: curr.y - 1 }
                    ];

                    for (let n of neighbors) {
                        if (n.x >= 0 && n.x < 32 && n.y >= 0 && n.y < 18) {
                            const key = `${n.x},${n.y}`;
                            if (!visited.has(key) && this.grid[n.x][n.y] !== 'steel') {
                                visited.add(key);
                                queue.push(n);
                            }
                        }
                    }
                }
                return false;
            }
        }

        class ActionScene extends Phaser.Scene {
            constructor() { super('ActionScene'); }
            init(data) { this.gridData = data.grid; this.hp = 2; this.timer = 45; }

            create() {
                const width = 1280; const height = 720;
                this.platforms = this.physics.add.staticGroup();
                this.hazards = this.physics.add.staticGroup();
                this.projectiles = this.physics.add.group();
                this.coreGroup = this.physics.add.staticGroup();

                for (let i = 0; i < 32; i++) {
                    for (let j = 0; j < 18; j++) {
                        const item = this.gridData[i][j];
                        const x = i * 40 + 20; const y = j * 40 + 20;
                        if (item === 'steel') this.platforms.create(x, y, null).setDisplaySize(40, 40).setTint(0x555555).refreshBody();
                        else if (item === 'spikes') {
                            this.hazards.create(x, y, null).setDisplaySize(30, 30).refreshBody();
                            this.add.rectangle(x, y, 20, 20, 0xff0000);
                        }
                        else if (item === 'core') {
                            this.coreObj = this.coreGroup.create(x, y, null).setDisplaySize(60, 60).refreshBody();
                            this.add.star(x, y, 5, 15, 30, 0x00ffff).setStrokeStyle(3, 0xff00ff);
                        }
                        else if (item === 'fake') this.add.rectangle(x, y, 40, 40, 0x444444);
                        else if (item === 'turret') {
                            this.add.rectangle(x, y, 30, 30, 0xffff00);
                            this.time.addEvent({ delay: 2000, callback: () => this.fireTurret(x, y), loop: true });
                        }
                    }
                }

                this.player = this.physics.add.sprite(40, 680, null).setCircle(15);
                this.player.setCollideWorldBounds(true).setTint(0x00ffff);
                this.pVisual = this.add.circle(0, 0, 15, 0x00ffff);

                this.cursors = this.input.keyboard.createCursorKeys();
                this.keys = this.input.keyboard.addKeys('W,A,S,D');

                this.physics.add.collider(this.player, this.platforms);
                this.physics.add.overlap(this.player, this.hazards, (p, h) => {
                    h.destroy(); // Espinho some após hit
                    this.takeDamage();
                });
                this.physics.add.overlap(this.player, this.coreGroup, () => {
                    alert("NÚCLEO INVASO! SISTEMA DESTRUÍDO.");
                    this.scene.start('MainMenu');
                });
                this.physics.add.overlap(this.player, this.projectiles, (p, proj) => {
                    proj.destroy();
                    this.takeDamage();
                });
                this.physics.add.collider(this.projectiles, this.platforms, (p) => p.destroy());

                // HUD
                this.hpText = this.add.text(20, 20, `VIDAS: ${'❤️'.repeat(this.hp)}`, { fontSize: '24px', color: '#ff00ff' });
                this.timerText = this.add.text(1100, 20, `TEMPO: ${this.timer}s`, { fontSize: '24px', color: '#ffff00' });

                this.timeEvent = this.time.addEvent({
                    delay: 1000,
                    callback: () => {
                        this.timer--;
                        this.timerText.setText(`TEMPO: ${this.timer}s`);
                        if (this.timer <= 0) this.gameOver("TEMPO ESGOTADO!");
                    },
                    loop: true
                });
            }

            fireTurret(x, y) {
                // Atira no jogador se ele estiver perto
                const p = this.projectiles.create(x, y, null).setDisplaySize(10, 10).setTint(0xffff00);
                p.body.setAllowGravity(false);
                this.physics.moveToObject(p, this.player, 250);
            }

            takeDamage() {
                this.hp--;
                this.hpText.setText(`VIDAS: ${'❤️'.repeat(this.hp)}`);
                this.cameras.main.shake(100, 0.01);
                if (this.hp <= 0) this.gameOver("VOCÊ FOI DESTRUÍDO!");
            }

            gameOver(msg) {
                alert(msg);
                this.scene.start('MainMenu');
            }

            update() {
                this.pVisual.setPosition(this.player.x, this.player.y);
                const speed = 250;
                this.player.setVelocity(0);

                if (this.cursors.left.isDown || this.keys.A.isDown) this.player.setVelocityX(-speed);
                else if (this.cursors.right.isDown || this.keys.D.isDown) this.player.setVelocityX(speed);

                if (this.cursors.up.isDown || this.keys.W.isDown) this.player.setVelocityY(-speed);
                else if (this.cursors.down.isDown || this.keys.S.isDown) this.player.setVelocityY(speed);
            }
        }

        const config = {
            type: Phaser.CANVAS,
            width: 1280, height: 720,
            backgroundColor: '#0a0a0c',
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
            physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } }, // SEM GRAVIDADE
            scene: [Boot, Preloader, MainMenu, BuildScene, ActionScene]
        };

        new Phaser.Game(config);
    </script>
</body>

</html>
